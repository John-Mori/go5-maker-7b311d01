name = "go5-fanza-proxy"
main = "src/index.js"
compatibility_date = "2024-11-01"

# ── cron トリガー：市場全体巡回(Market Crawl)を毎朝06:00 JST(=UTC 21:00)に実行 ──
#   同人フロアのランキング上位+新着を D1 market_snapshot へスナップショット保存する。
#   PC/Claude窓に依存せず「ちゃんと毎朝」を取得側で担保(設計書§0)。
#   ※新規cron追加(既存トリガーは無かった)。デプロイ=要Chami承認(不変条件)。
[triggers]
crons = ["0 21 * * *"]

# ── 非秘密の設定（ここに秘密は書かない。秘密は wrangler secret put で登録）──
[vars]
# フロント(GitHub Pages)のOriginだけ許可（ワイルドカード不可）
ALLOWED_ORIGIN = "https://john-mori.github.io"
# D1移行の切替弁：
#   "off"     = 従来どおりKVのみ（現行・デフォルト）
#   "dual"    = D1優先で読み、書き込みはD1+KV両方（移行検証期・保険）
#   "on"      = D1のみ（カットオーバー後・KV書き込み停止）
# 問題時は "off" に戻して再デプロイすれば即ロールバック。
USE_D1 = "on"

# ── KV：API未収録作品の上書き情報(ov:<cid>)と取得依頼キュー(req:<cid>) ──
#   PC側スクリプト(scripts/fetch_missing_works.mjs)が日本IPでスクレイプした
#   フル情報を ov: に保存し、以後 /api/fanza-item がそれを優先して返す。
[[kv_namespaces]]
binding = "FANZA_KV"
id = "2e310c3f2fe44c7b814dfc2f1027ade6"

# ── D1：KVの書き込み枠(1,000/日)の天井を外すため、高頻度データをD1(10万行/日)へ移行 ──
#   works(ov:+sales:統合) / fetch_queue(req:+salesreq:) / tracked_makers / run_flags。
#   スキーマ=schema.sql。移行手順=docs/設計・調査/D1移行設計書_fanzaデータ_Phase1.md。
#   USE_D1(下の[vars])で D1優先/KVフォールバック を切替=即ロールバック可。
[[d1_databases]]
binding = "FANZA_DB"
database_name = "go5_fanza"
database_id = "39c22ab0-e90b-4755-9270-7265b9fed530"

# ── D1(継続改善制度): 改善要求/行動ログ/変更ログ/insights/部門イベント/タスク/ペルソナ/学習/コピー差分の12表 ──
#   スキーマ=kaizen_schema.sql。設計=docs/設計・調査/AI組織_実装設計書_v3_統合ロードマップ.md
[[d1_databases]]
binding = "KAIZEN_DB"
database_name = "go5_kaizen"
database_id = "dff88863-c040-4429-b847-a528c9b68914"

# ── Secrets（コマンドで登録。ここには書かない）──
#   wrangler secret put SHARED_SECRET         ← フロント認証キー（必須・公開可のソフト鍵）
#   wrangler secret put ADMIN_SECRET          ← 管理鍵（override/queue用・PCバッチのみ保持・配布禁止）
#   wrangler secret put FANZA_API_ID          ← DMM API ID（任意・推奨）
#   wrangler secret put FANZA_AFFILIATE_ID    ← FANZAアフィリエイトID（任意・推奨）
#
# FANZA_API_ID / FANZA_AFFILIATE_ID を設定すると DMM公式API優先になり安定します。
# 未設定の場合はスクレイピング（og:title）にフォールバックします。
# DMM API 登録: https://affiliate.dmm.com/api/
